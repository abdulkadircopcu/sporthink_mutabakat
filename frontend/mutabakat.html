<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mutabakat | Sporthink Mutabakat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <div class="logo-title">Sporthink Mutabakat</div>
          <div class="logo-sub">E-Ticaret Analiz Platformu</div>
        </div>
      </div>
      <nav id="mainNav" class="main-nav"></nav>
    </div>
  </header>

  <main class="page-main">

    <!-- Özet Kartları -->
    <div class="stat-grid" id="mutabakatStatGrid">
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-label">Eslesen</div>
        <div class="stat-value" id="statEslesen">—</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-icon">⚠</div>
        <div class="stat-label">Fark Var</div>
        <div class="stat-value" id="statFark">—</div>
      </div>
      <div class="stat-card error">
        <div class="stat-icon">🔴</div>
        <div class="stat-label">Manuel Inceleme</div>
        <div class="stat-value" id="statManuel">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-label">Beklemede</div>
        <div class="stat-value" id="statBeklemede">—</div>
      </div>
    </div>

    <!-- Pazaryeri Bazlı Tablo -->
    <div class="card table-card">
      <div class="table-header">
        <h2 class="table-title">Pazaryeri Bazli Mutabakat Ozeti</h2>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Pazaryeri</th>
              <th>Durum</th>
              <th>Siparis Adedi</th>
              <th>Toplam Fark (TL)</th>
            </tr>
          </thead>
          <tbody id="mutabakatBody">
            <tr><td colspan="4" class="table-empty">Veri yükleniyor...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="nav.js"></script>
  <script src="mutabakat_page.js"></script>
</body>
</html>
