<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ayarlar | Sporthink Mutabakat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Tab Bar ── */
    .tab-bar { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:24px; padding-bottom:0; }
    .tab-btn { background:none; border:none; color:var(--text-muted); font-size:14px; font-weight:500; padding:10px 18px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; font-family:inherit; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── Kargo Desi Seçici ── */
    .pz-selector { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .pz-btn { padding:7px 16px; background:var(--bg3); border:1px solid var(--border); color:var(--text-muted); border-radius:8px; font-size:13px; cursor:pointer; transition:all 0.15s; font-family:inherit; }
    .pz-btn:hover { border-color:var(--accent); color:var(--text); }
    .pz-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

    /* ── Inline Edit ── */
    .editable-input { background:var(--bg3); border:1px solid var(--accent); color:var(--text); border-radius:5px; padding:4px 8px; font-size:13px; width:90px; font-family:inherit; }
    .editable-input:focus { outline:none; }
    .btn-edit   { background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; transition:all 0.15s; font-family:inherit; }
    .btn-edit:hover { border-color:var(--accent); color:var(--accent); }
    .btn-save   { background:var(--green); border:none; color:#0d1117; border-radius:6px; padding:4px 10px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-cancel { background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; font-family:inherit; }
    .btn-save:hover { filter:brightness(1.1); }

    /* ── Kullanıcı Tablosu ── */
    .rol-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
    .rol-admin   { background:rgba(163,113,247,0.15); color:#a371f7; }
    .rol-analist { background:rgba(88,166,255,0.15);  color:#58a6ff; }
    .rol-okuyucu { background:rgba(139,148,158,0.15); color:#8b949e; }
    .aktif-badge { display:inline-block; width:8px; height:8px; border-radius:50%; }
    .aktif-evet { background:var(--green); }
    .aktif-hayir{ background:var(--red); }
    .rol-select { background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:4px 8px; font-size:12px; font-family:inherit; cursor:pointer; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <img src="images/sporthink_logo.png" alt="Sporthink Logo"/>
        <div>
          <div class="logo-title">Sporthink Mutabakat</div>
          <div class="logo-sub">E-Ticaret Analiz Platformu</div>
        </div>
      </div>
      <nav id="mainNav" class="main-nav"></nav>
      <div class="header-right"></div>
    </div>
  </header>

  <main class="page-main">

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="kargo">Kargo Desi Fiyatları</button>
      <button class="tab-btn"        data-tab="kategori">Kategori Desi Listesi</button>
      <button class="tab-btn"        data-tab="kullanicilar" id="tabKullanicilar" style="display:none">Kullanıcılar</button>
    </div>

    <!-- ── Panel: Kargo Desi ── -->
    <div class="tab-panel active" id="panel-kargo">
      <div class="card">
        <div class="table-header">
          <h2 class="table-title">Kargo Desi Fiyatları</h2>
        </div>
        <div class="pz-selector">
          <button class="pz-btn active" data-pz="trendyol">Trendyol</button>
          <button class="pz-btn" data-pz="hepsiburada">Hepsiburada</button>
          <button class="pz-btn" data-pz="lcw">LCW</button>
          <button class="pz-btn" data-pz="n11">N11</button>
          <button class="pz-btn" data-pz="pazarama">Pazarama</button>
          <button class="pz-btn" data-pz="flo">Flo</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead id="kargoHead"></thead>
            <tbody id="kargoBody">
              <tr><td colspan="10" class="table-empty">Yükleniyor...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── Panel: Kategori Desi ── -->
    <div class="tab-panel" id="panel-kategori">
      <div class="card">
        <div class="table-header">
          <h2 class="table-title">Kategori Desi Listesi</h2>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Ana Kategori</th>
                <th>Alt Kategori</th>
                <th>Cinsiyet</th>
                <th>Barkod</th>
                <th style="text-align:right">Tahmini Desi</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="kategoriBody">
              <tr><td colspan="6" class="table-empty">Yükleniyor...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── Panel: Kullanıcılar (sadece admin) ── -->
    <div class="tab-panel" id="panel-kullanicilar">
      <div class="card">
        <div class="table-header">
          <h2 class="table-title">Kullanıcı Yönetimi</h2>
          <span class="table-count" id="kullaniciCount"></span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Ad Soyad</th>
                <th>E-posta</th>
                <th>Rol</th>
                <th>Durum</th>
                <th>Son Giriş</th>
                <th>Kayıt Tarihi</th>
                <th>Rol Değiştir</th>
              </tr>
            </thead>
            <tbody id="kullaniciBody">
              <tr><td colspan="7" class="table-empty">Yükleniyor...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="ayarlar.js"></script>
</body>
</html>
